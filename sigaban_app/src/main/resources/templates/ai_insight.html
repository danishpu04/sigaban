<script>
    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');
    const sendButton = document.getElementById('send-button');

    const STORAGE_KEY = 'sigaban_chat_history';
    let chatHistory = JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || [];

    // Initialize chat UI on load
    function initChat() {
        if (chatHistory.length === 0) {
            // Optional: Initial greeting if empty, but we'll leave it truly empty based on user request.
        } else {
            chatHistory.forEach(msg => {
                if (msg.role === 'user') {
                    renderUserMessage(msg.content);
                } else {
                    renderAIMessage(msg.content);
                }
            });
            scrollToBottom();
        }
    }

    function saveHistory() {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function renderUserMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'flex items-start justify-end max-w-[85%] ml-auto';
        msgDiv.innerHTML = `
            <div class="bg-primary text-on-primary rounded-2xl rounded-tr-none p-md shadow-sm">
                <p class="font-body-sm text-body-sm leading-relaxed">${escapeHtml(text)}</p>
            </div>
        `;
        chatContainer.appendChild(msgDiv);
    }

    function renderAIMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'flex items-start max-w-[85%]';
        let formattedText = escapeHtml(text).replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>');
        formattedText = formattedText.replace(/\\n/g, '<br>');
        
        msgDiv.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center mr-sm flex-shrink-0 mt-1">
                <span class="material-symbols-outlined text-on-primary-container text-sm">psychology</span>
            </div>
            <div class="bg-surface-container-low border border-outline-variant/30 rounded-2xl rounded-tl-none p-md ai-glow">
                <p class="font-body-sm text-body-sm text-on-surface leading-relaxed">${formattedText}</p>
            </div>
        `;
        chatContainer.appendChild(msgDiv);
    }

    function appendUserMessage(text) {
        renderUserMessage(text);
        chatHistory.push({role: 'user', content: text});
        saveHistory();
        scrollToBottom();
    }

    function appendAIMessage(text) {
        renderAIMessage(text);
        chatHistory.push({role: 'ai', content: text});
        saveHistory();
        scrollToBottom();
    }

    function appendLoadingIndicator() {
        const msgDiv = document.createElement('div');
        msgDiv.id = 'ai-loading';
        msgDiv.className = 'flex items-start max-w-[85%]';
        msgDiv.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center mr-sm flex-shrink-0 mt-1">
                <span class="material-symbols-outlined text-on-primary-container text-sm animate-spin">sync</span>
            </div>
            <div class="bg-surface-container-low border border-outline-variant/30 rounded-2xl rounded-tl-none p-md flex items-center space-x-2">
                <div class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                <div class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                <div class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 300ms"></div>
            </div>
        `;
        chatContainer.appendChild(msgDiv);
        scrollToBottom();
    }

    function removeLoadingIndicator() {
        const loading = document.getElementById('ai-loading');
        if (loading) {
            loading.remove();
        }
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function escapeHtml(unsafe) {
        return unsafe
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    }

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        chatInput.value = '';
        chatInput.disabled = true;
        sendButton.disabled = true;

        appendUserMessage(text);
        appendLoadingIndicator();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) {
                // If the backend returns 500, we should still try to parse the error message if it's sent as JSON
                // In our current AiController, we return 200 OK even for errors, so it shouldn't hit here.
                throw new Error('Network response was not ok');
            }

            const data = await response.json();
            removeLoadingIndicator();
            appendAIMessage(data.reply);
        } catch (error) {
            console.error('Error:', error);
            removeLoadingIndicator();
            appendAIMessage('Maaf, saya tidak dapat terhubung ke server saat ini.');
        } finally {
            chatInput.disabled = false;
            sendButton.disabled = false;
            chatInput.focus();
        }
    }

    // Run on startup
    initChat();
</script>
