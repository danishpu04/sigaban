spring.application.name=sigaban

# MySQL Database Configuration (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/sigaban?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (optional, good for debugging)
spring.jpa.show-sql=true

# Disable Thymeleaf cache for development (changes take effect on page refresh)
spring.thymeleaf.cache=false
